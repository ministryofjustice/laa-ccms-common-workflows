name: Gradle build and publish

on:
  workflow_call:
    inputs:
      # ── New input ──────────────────────────────────────────────────────────
      release_type:
        description: >
          Release type: major | minor | patch | snapshot | none.
          Leave empty to auto-detect from Conventional Commits on push to main,
          or for build-only on all other triggers.

          Auto-detect rules (Conventional Commits):
            feat!: / fix!: / BREAKING CHANGE  →  major (x.0.0)
            feat:                              →  minor (0.x.0)
            fix: / chore: / refactor:          →  patch (0.0.x)
            anything else                      →  patch (default)

          Use 'snapshot' on PR/feature branches for a pre-release build.
          Use 'none' to run tests only with no tag or publish step.
        required: false
        type: string
        default: ''
      # ── Existing inputs (unchanged) ────────────────────────────────────────
      java_version:
        required: false
        type: string
        default: 25
      java_distribution:
        required: false
        type: string
        default: temurin
      build_command:
        required: false
        type: string
        default: build
      build_args:
        required: false
        type: string
      integration_test_task:
        required: false
        type: string
      publish_package:
        required: false
        type: string
        default: false
      override_version:
        required: false
        type: string
      override_tagged_branch:
        required: false
        type: string
        default: main
      junit_results:
        required: false
        type: string
        default: true
      junit_results_path:
        required: false
        type: string
        default: build/test-results
      junit_report:
        required: false
        type: string
        default: true
      junit_report_path:
        required: false
        type: string
        default: build/reports/tests
      checkstyle_report:
        required: false
        type: string
        default: true
      checkstyle_report_path:
        required: false
        type: string
        default: build/reports/checkstyle
      jacoco_coverage_report:
        required: false
        type: string
        default: true
      jacoco_coverage_report_path:
        required: false
        type: string
        default: build/reports/jacoco
      github_bot_username:
        required: false
        type: string
        default: github-actions-bot
      semgrep_check:
        required: false
        type: string
        default: false
      # ── Deprecated inputs ──────────────────────────────────────────────────
      # create_tag: superseded by release_type=patch/minor/major
      create_tag:
        description: "DEPRECATED: use release_type=patch/minor/major instead."
        required: false
        type: string
        default: false
      # is_snapshot: superseded by release_type=snapshot
      is_snapshot:
        description: "DEPRECATED: use release_type=snapshot instead."
        required: false
        type: string
        default: false
    secrets:
      gh_token:
        required: true
      aws_region:
        required: false
      github_app_id:
        required: false
      github_app_private_key:
        required: false
      github_app_organisation:
        required: false
    outputs:
      published_artifact_version:
        description: "The version of the published artifact."
        value: ${{ jobs.build-and-publish.outputs.published_artifact_version }}

permissions:
  contents: write
  packages: write

jobs:
  semgrep-scan:
    if: ${{ inputs.semgrep_check == 'true' }}
    name: semgrep-security-scan
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Run Semgrep scan
        run: semgrep scan --exclude-rule python.django.security.django-no-csrf-token.django-no-csrf-token --error --config auto

  build-and-publish:
    needs: semgrep-scan
    if: ${{ always() && (inputs.semgrep_check != 'true' || (needs.semgrep-scan.result != 'failure' && needs.semgrep-scan.result != 'cancelled')) }}
    runs-on: ubuntu-latest

    name: >-
      ${{
        inputs.release_type == 'snapshot' && 'Build and publish snapshot' ||
        (inputs.release_type == 'patch' || inputs.release_type == 'minor' || inputs.release_type == 'major') && format('Release ({0})', inputs.release_type) ||
        inputs.release_type == '' && github.ref == 'refs/heads/main' && 'Release (auto-detect)' ||
        inputs.create_tag == 'true' && 'Create tag (deprecated)' ||
        inputs.publish_package == 'true' && 'Build and publish package' ||
        'Build pipeline'
      }}

    env:
      GITHUB_TOKEN: ${{ secrets.gh_token }}
      AWS_REGION: ${{ secrets.aws_region }}
      GITHUB_APP_ID: ${{ secrets.github_app_id }}
      GITHUB_APP_PRIVATE_KEY: ${{ secrets.github_app_private_key }}

    outputs:
      published_artifact_version: ${{ steps.capture_published_version.outputs.published_artifact_version }}

    steps:
      # ── Deprecation warnings ────────────────────────────────────────────────
      - name: Warn deprecated inputs
        if: ${{ inputs.create_tag == 'true' || inputs.is_snapshot == 'true' }}
        shell: bash
        run: |
          if [ "${{ inputs.create_tag }}" = "true" ]; then
            echo "::warning::The create_tag input is deprecated and will be removed in a future version. Use release_type=patch/minor/major instead. See https://github.com/ministryofjustice/laa-ccms-common-workflows/blob/main/docs/adrs/0002-git-tag-based-release-pipeline.md"
          fi
          if [ "${{ inputs.is_snapshot }}" = "true" ]; then
            echo "::warning::The is_snapshot input is deprecated and will be removed in a future version. Use release_type=snapshot instead. See https://github.com/ministryofjustice/laa-ccms-common-workflows/blob/main/docs/adrs/0002-git-tag-based-release-pipeline.md"
          fi

      # ── App token (used for tag push and release creation) ─────────────────
      - name: Get app token
        if: ${{ env.GITHUB_APP_ID != '' && env.GITHUB_APP_PRIVATE_KEY != '' }}
        id: get_workflow_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.github_app_id }}
          private-key: ${{ secrets.github_app_private_key }}
          owner: ${{ secrets.github_app_organisation }}

      # ── Checkout ────────────────────────────────────────────────────────────
      # Old deprecated create_tag path: shallow checkout of the target branch.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        if: ${{ inputs.create_tag == 'true' }}
        with:
          ref: ${{ inputs.override_tagged_branch }}
          token: ${{ steps.get_workflow_token.outputs.token || env.GITHUB_TOKEN }}

      # New release_type path and all other cases: full history for version computation.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        if: ${{ inputs.create_tag != 'true' }}
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ steps.get_workflow_token.outputs.token || env.GITHUB_TOKEN }}

      # ── Compute version (new release_type path) ──────────────────────────────────
      # Runs when release_type is explicit (patch/minor/major/snapshot) or when
      # release_type is empty and we are on main (auto-detect).
      # bump input overrides commit-based detection for explicit release types.
      - name: Compute version
        id: compute
        if: >-
          ${{
            inputs.create_tag != 'true' &&
            inputs.release_type != 'none' &&
            (inputs.release_type != '' || github.ref == 'refs/heads/main')
          }}
        uses: ministryofjustice/laa-ccms-common-workflows/.github/actions/compute-version@chore/LJCP-27_release_plugin # TODO: pin to SHA on merge
        with:
          bump: ${{ inputs.release_type != 'snapshot' && inputs.release_type || '' }}

      # Compute SNAPSHOT version for release_type=snapshot.
      - name: Compute snapshot version
        id: snapshot
        if: ${{ inputs.create_tag != 'true' && inputs.release_type == 'snapshot' }}
        shell: bash
        env:
          BUMP_TYPE:  ${{ steps.compute.outputs.bump_type }}
          MAJOR:      ${{ steps.compute.outputs.major }}
          MINOR:      ${{ steps.compute.outputs.minor }}
          PATCH:      ${{ steps.compute.outputs.patch }}
        run: |
          set -eu
          BUMP="${BUMP_TYPE:-none}"
          M="${MAJOR:-0}"; N="${MINOR:-0}"; P="${PATCH:-0}"
          # For snapshots, always bump at least patch when no conventional commit found.
          if [[ "$BUMP" == "none" ]]; then P=$((P+1)); fi
          HASH=$(git rev-parse --short HEAD)
          VERSION="${M}.${N}.${P}-${HASH}-SNAPSHOT"
          echo "snapshot_version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Computed snapshot version: ${VERSION}"

      # ── JDK / Gradle setup ──────────────────────────────────────────────────
      - name: Set up JDK ${{ inputs.java_version }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: ${{ inputs.java_version }}
          distribution: ${{ inputs.java_distribution }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      # ── Build and test ───────────────────────────────────────────────────────
      - name: Gradle ${{ inputs.build_command }}
        run: ./gradlew ${{ inputs.build_command }} ${{ inputs.build_args }}

      - name: Test coverage verification
        if: ${{ inputs.jacoco_coverage_report == 'true' }}
        run: ./gradlew jacocoTestCoverageVerification

      - name: Force docker-java API version (temporary workaround for testcontainers)
        run: |
          echo "This is a temporary workaround for https://github.com/testcontainers/testcontainers-java/issues/11212"
          echo "api.version=1.44" > ~/.docker-java.properties

      - name: Integration test
        if: ${{ inputs.integration_test_task != '' }}
        run: ./gradlew ${{ inputs.integration_test_task }}

      # ── Deprecated publish paths ─────────────────────────────────────────────
      - name: Publish snapshot package (deprecated)
        if: ${{ inputs.publish_package == 'true' && inputs.create_tag == 'false' && inputs.is_snapshot == 'true' }}
        run: ./gradlew updateSnapshotVersion && ./gradlew publish

      - name: Publish package (deprecated)
        if: ${{ inputs.publish_package == 'true' && inputs.create_tag == 'false' && inputs.is_snapshot != 'true' && inputs.release_type == '' }}
        env:
          OVERRIDE_VERSION: ${{ inputs.override_version }}
        run: |
          PUBLISH_ARGS=()
          if [[ -n "$OVERRIDE_VERSION" ]]; then
            PUBLISH_ARGS+=(-Pversion=$OVERRIDE_VERSION)
          fi
          ./gradlew publish ${PUBLISH_ARGS[@]}

      - name: Create tag (deprecated)
        if: ${{ inputs.create_tag == 'true' }}
        run: |
          if [ -z "${{ steps.get_workflow_token.outputs.token }}" ]; then
            echo "GitHub App token will not be used for this run."
          else
            echo "GitHub App token will be used for this run."
          fi
          git config --global user.email "${{ inputs.github_bot_username }}[bot]@users.noreply.github.com"
          git config --global user.name "${{ inputs.github_bot_username }}[bot]"
          ./gradlew release -Prelease.useAutomaticVersion=true
        env:
          GITHUB_TOKEN: ${{ steps.get_workflow_token.outputs.token || env.GITHUB_TOKEN }}

      # ── New release_type: publish snapshot ─────────────────────────────────────────
      - name: Publish snapshot
        if: ${{ inputs.create_tag != 'true' && inputs.release_type == 'snapshot' && steps.snapshot.outputs.snapshot_version != '' }}
        env:
          VERSION: ${{ steps.snapshot.outputs.snapshot_version }}
        run: ./gradlew publish -Pversion="${VERSION}"

      # ── New release_type: create tag ───────────────────────────────────────────────
      # Runs for explicit release_type=patch/minor/major or auto-detected release on main.
      - name: Create Git tag
        id: create-tag
        if: >-
          ${{
            inputs.create_tag != 'true' &&
            inputs.release_type != 'snapshot' &&
            steps.compute.outputs.next_version != ''
          }}
        shell: bash
        env:
          GTAG:         ${{ steps.compute.outputs.next_version }}
          BOT_USERNAME: ${{ inputs.github_bot_username }}
          GIT_TOKEN:    ${{ steps.get_workflow_token.outputs.token || env.GITHUB_TOKEN }}
        run: |
          set -eu
          test -n "$GTAG"
          git config user.name  "${BOT_USERNAME}[bot]"
          git config user.email "${BOT_USERNAME}[bot]@users.noreply.github.com"
          if git ls-remote --tags origin | grep -q "refs/tags/${GTAG}$"; then
            echo "Tag ${GTAG} already exists on remote. Skipping."
            echo "gtag=${GTAG}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Creating Git tag [${GTAG}]"
          git tag -a "$GTAG" -m "Release ${GTAG}"
          git push origin "$GTAG" || {
            EXIT=$?
            if git ls-remote --tags origin | grep -q "refs/tags/${GTAG}$"; then
              echo "Tag ${GTAG} was already pushed (race condition). Skipping."
            else
              echo "::error::Failed to push tag ${GTAG} (exit ${EXIT})"
              exit $EXIT
            fi
          }
          echo "gtag=${GTAG}" >> "$GITHUB_OUTPUT"

      # ── New release_type: publish release artifact ─────────────────────────────────
      - name: Publish release artifact
        if: ${{ steps.create-tag.outputs.gtag != '' }}
        env:
          VERSION: ${{ steps.create-tag.outputs.gtag }}
        run: ./gradlew publish -Pversion="${VERSION#v}"

      # ── New release_type: create GitHub Release ────────────────────────────────────
      - name: Create GitHub Release
        if: ${{ steps.create-tag.outputs.gtag != '' }}
        env:
          GH_TOKEN: ${{ steps.get_workflow_token.outputs.token || github.token }}
          GTAG:     ${{ steps.create-tag.outputs.gtag }}
        run: |
          test -n "$GTAG"
          if gh release view "$GTAG" >/dev/null 2>&1; then
            echo "Release ${GTAG} already exists. Skipping."
            exit 0
          fi
          echo "Creating GitHub Release [${GTAG}]"
          gh release create "$GTAG" --verify-tag --title "$GTAG" --generate-notes

      # ── Capture published version ─────────────────────────────────────────────
      - name: Capture published version
        id: capture_published_version
        shell: bash
        run: |
          set -eu
          # Priority: release tag > snapshot > override_version > gradle.properties
          if [[ -n "${{ steps.create-tag.outputs.gtag }}" ]]; then
            VERSION="${{ steps.create-tag.outputs.gtag }}"
            VERSION="${VERSION#v}"
          elif [[ -n "${{ steps.snapshot.outputs.snapshot_version }}" ]]; then
            VERSION="${{ steps.snapshot.outputs.snapshot_version }}"
          elif [[ -n "${{ inputs.override_version }}" ]]; then
            VERSION="${{ inputs.override_version }}"
          else
            VERSION=$(grep "^version=" gradle.properties | cut -d'=' -f2)
          fi
          echo "published_artifact_version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Artifact version: \`${VERSION}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Artifact version: ${VERSION}"

      # ── Upload reports ────────────────────────────────────────────────────────
      - name: Upload test results
        if: ${{ inputs.junit_results == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results
          path: ${{ inputs.junit_results_path }}
          retention-days: 14

      - name: Upload test report
        if: ${{ inputs.junit_report == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-report
          path: ${{ inputs.junit_report_path }}
          retention-days: 14

      - name: Upload checkstyle report
        if: ${{ inputs.checkstyle_report == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: checkstyle-report
          path: ${{ inputs.checkstyle_report_path }}
          retention-days: 14

      - name: Upload jacoco coverage report
        if: ${{ inputs.jacoco_coverage_report == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: jacoco-coverage-report
          path: ${{ inputs.jacoco_coverage_report_path }}
          retention-days: 14
